{{ template "header" . }}
<div class="max-w-3xl mx-auto bg-white rounded-xl shadow-sm border border-gray-100 p-8">
    <h3 class="text-xl font-semibold text-gray-800 mb-6 border-b pb-4">Tambah Produk Baru</h3>
    
    <form action="/product/new" method="POST" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-2">
                <label for="part_number" class="block text-sm font-medium text-gray-700">Part Number</label>
                <input type="text" name="part_number" id="part_number" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
            </div>
            
            <div class="space-y-2">
                <label for="location" class="block text-sm font-medium text-gray-700">Lokasi / Rak</label>
                <input type="text" name="location" id="location" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-2">
                <label for="description" class="block text-sm font-medium text-gray-700">Deskripsi</label>
                <textarea name="description" id="description" rows="3" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"></textarea>
            </div>
            
            <div class="space-y-2">
                <label for="category" class="block text-sm font-medium text-gray-700">Kategori</label>
                <select name="category" id="category" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                    {{ range .Categories }}
                    <option value="{{ .Name }}">{{ .Name }}</option>
                    {{ end }}
                </select>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="space-y-2">
                <label for="quantity" class="block text-sm font-medium text-gray-700">Stok Awal</label>
                <input type="number" name="quantity" id="quantity" value="0" required min="0" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
            </div>

            <div class="space-y-2">
                <label for="min_stock_level" class="block text-sm font-medium text-gray-700">Minimal Stok</label>
                <input type="number" name="min_stock_level" id="min_stock_level" required min="0" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
            </div>

            <div class="space-y-2">
                <label for="capital_price" class="block text-sm font-medium text-gray-700">Harga Modal (Rp)</label>
                <input type="text" name="capital_price" id="capital_price" required class="rupiah-input w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
            </div>

            <div class="space-y-2">
                <label for="selling_price" class="block text-sm font-medium text-gray-700">Harga Jual (Rp)</label>
                <input type="text" name="selling_price" id="selling_price" required class="rupiah-input w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
            </div>
        </div>

        <div class="pt-6 flex items-center justify-end space-x-4 border-t border-gray-100">
            <a href="/inventory" class="px-6 py-2.5 text-sm font-medium text-gray-600 bg-gray-50 hover:bg-gray-100 rounded-lg transition-colors">Batal</a>
            <button type="submit" class="px-6 py-2.5 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors shadow-sm">Simpan Produk</button>
        </div>
    </form>
</div>
{{ template "footer" . }}

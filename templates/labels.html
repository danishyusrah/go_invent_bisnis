<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cetak Massal Barcode Stiker</title>
    <style>
        body { font-family: sans-serif; background: #eee; margin: 0; padding: 20px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, 40mm); gap: 5mm; justify-content: center; }
        .label { background: #fff; width: 40mm; height: 30mm; border: 1px dashed #ccc; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2mm; box-sizing: border-box; text-align: center; overflow: hidden;}
        .label h4 { margin: 0; font-size: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
        .label p { margin: 2px 0 0; font-size: 8px; font-weight: bold; }
        .label img { max-width: 100%; max-height: 20mm; display: block; margin-top: 2px; }
        @media print {
            body { background: #fff; padding: 0; margin: 0; }
            .no-print { display: none; }
            .label { border: none; }
        }
        .btn { display: block; padding: 10px 20px; background: #000; color: #fff; text-decoration: none; border-radius: 5px; margin-bottom: 20px; width: max-content; margin-left: auto; margin-right: auto; }
    </style>
</head>
<body>
    <button class="btn no-print" onclick="window.print()">Cetak Label ke Printer Barcode / Stiker</button>
    <div class="grid-container">
        {{ range .Products }}
        <div class="label">
            <h4>{{ .Description }}</h4>
            <img src="/product/qrcode/{{ .ID }}" alt="Barcode">
            <p>{{ .PartNumber }}</p>
        </div>
        {{ end }}
    </div>
</body>
</html>

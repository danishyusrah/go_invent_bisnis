{{ template "header" . }}
<div class="max-w-2xl mx-auto bg-white rounded-xl shadow-sm border border-gray-100 p-8">
    <h3 class="text-xl font-semibold text-gray-800 mb-6 border-b pb-4">Transaksi Stok: {{ .Product.PartNumber }}</h3>
    
    <div class="mb-6 p-4 bg-gray-50 rounded-lg border border-gray-200">
        <p class="text-sm text-gray-600 mb-1">Stok Saat Ini</p>
        <p class="text-3xl font-bold text-gray-800">{{ .Product.Quantity }}</p>
    </div>

    <form action="/product/{{ .Product.ID }}/transaction" method="POST" class="space-y-6">
        <div class="space-y-2">
            <label class="block text-sm font-medium text-gray-700">Jenis Transaksi</label>
            <div class="flex space-x-4">
                <label class="flex items-center p-3 border rounded-lg cursor-pointer hover:bg-gray-50 flex-1">
                    <input type="radio" name="transaction_type" value="IN" class="w-4 h-4 text-green-600 focus:ring-green-500" required>
                    <span class="ml-2 text-sm font-medium text-green-700">Barang Masuk (IN)</span>
                </label>
                <label class="flex items-center p-3 border rounded-lg cursor-pointer hover:bg-gray-50 flex-1">
                    <input type="radio" name="transaction_type" value="OUT" class="w-4 h-4 text-red-600 focus:ring-red-500" required>
                    <span class="ml-2 text-sm font-medium text-red-700">Barang Keluar (OUT)</span>
                </label>
            </div>
        </div>

        <div class="space-y-2">
            <label for="quantity" class="block text-sm font-medium text-gray-700">Kuantitas</label>
            <input type="number" name="quantity" id="quantity" required min="1" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
        </div>

        <div class="space-y-2">
            <label for="notes" class="block text-sm font-medium text-gray-700">Catatan / Alasan (Opsional)</label>
            <input type="text" name="notes" id="notes" placeholder="Contoh: Pembelian PO-123 atau Pengambilan teknisi Budi" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all">
        </div>

        <div class="pt-6 flex items-center justify-end space-x-4 border-t border-gray-100">
            <a href="/inventory" class="px-6 py-2.5 text-sm font-medium text-gray-600 bg-gray-50 hover:bg-gray-100 rounded-lg transition-colors">Batal</a>
            <button type="submit" class="px-6 py-2.5 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors shadow-sm">Simpan Transaksi</button>
        </div>
    </form>
</div>
{{ template "footer" . }}
